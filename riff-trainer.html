<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riff Trainer — compasso 85</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@400;500;600&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0a09;
    --panel:#17130f;
    --panel-2:#1f1813;
    --line:#332921;
    --amber:#ff8a1f;
    --amber-dim:#a85811;
    --hot:#ff3b1f;
    --ink:#f3e7d6;
    --muted:#9c8b76;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(255,138,31,.10), transparent 60%),
      radial-gradient(100% 60% at 50% 120%, rgba(255,59,31,.06), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:"Barlow Condensed",sans-serif;
    min-height:100%;
    display:flex; justify-content:center;
    padding:22px 16px 40px;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{width:100%;max-width:520px}
  /* texture */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.04;
    background-image:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px);
    mix-blend-mode:overlay;
  }
  header{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:18px}
  h1{
    font-family:"Anton",sans-serif; font-weight:400; letter-spacing:.02em;
    font-size:clamp(30px,9vw,46px); line-height:.92; text-transform:uppercase;
    color:var(--ink);
  }
  h1 span{color:var(--amber)}
  .tag{
    font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--muted);
    text-align:right; letter-spacing:.04em; white-space:nowrap;
  }

  .panel{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 20px 40px -20px #000;
    padding:18px;
    margin-bottom:14px;
  }

  /* BPM display */
  .display{
    text-align:center; padding:24px 0 8px;
    border-radius:12px;
    background:radial-gradient(120% 120% at 50% 30%, rgba(255,138,31,.08), transparent 70%);
    position:relative;
  }
  .pulse{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:12px;height:12px;border-radius:50%;
    background:#2a2018; box-shadow:0 0 0 1px var(--line) inset;
    transition:none;
  }
  .pulse.on{background:var(--amber); box-shadow:0 0 18px 4px rgba(255,138,31,.7)}
  .pulse.acc{background:var(--hot); box-shadow:0 0 22px 6px rgba(255,59,31,.8)}
  .bpm{
    font-family:"JetBrains Mono",monospace; font-weight:800;
    font-size:clamp(72px,24vw,120px); line-height:1; letter-spacing:-.04em;
    color:var(--amber); text-shadow:0 0 26px rgba(255,138,31,.35);
  }
  .bpm-unit{font-family:"Barlow Condensed";font-weight:600;letter-spacing:.35em;font-size:13px;color:var(--muted);text-transform:uppercase}

  .row{display:flex; gap:10px; align-items:center; margin-top:16px}
  .row.center{justify-content:center}
  button{
    font-family:"Barlow Condensed",sans-serif; font-weight:600; cursor:pointer;
    border:1px solid var(--line); background:var(--panel-2); color:var(--ink);
    border-radius:10px; padding:11px 14px; font-size:15px; letter-spacing:.03em;
    transition:transform .04s ease, background .15s, border-color .15s, color .15s;
    text-transform:uppercase;
  }
  button:active{transform:translateY(1px)}
  .step{width:54px; font-family:"JetBrains Mono"; font-weight:700; font-size:20px}
  .play{
    flex:1; padding:15px; font-size:18px; letter-spacing:.12em;
    background:var(--amber); color:#1a0f04; border-color:var(--amber);
    font-weight:600;
  }
  .play.stop{background:var(--hot); border-color:var(--hot); color:#1a0404}

  input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:6px;
    background:linear-gradient(90deg,var(--amber-dim),var(--amber)); margin-top:16px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:22px;height:22px;border-radius:50%;
    background:#fff; border:3px solid var(--amber); box-shadow:0 2px 8px #000; cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:3px solid var(--amber);cursor:pointer}

  .dice{display:flex; gap:10px; align-items:center; margin-top:16px; flex-wrap:wrap}
  .dice button{flex:1; background:var(--panel); }
  .spread{display:flex;align-items:center;gap:6px;font-family:"JetBrains Mono";font-size:13px;color:var(--muted)}
  .spread input{width:48px;background:#0c0a09;border:1px solid var(--line);color:var(--ink);
    font-family:"JetBrains Mono";border-radius:7px;padding:6px;text-align:center;font-size:14px}

  /* section label */
  .lbl{font-family:"JetBrains Mono";font-size:11px;letter-spacing:.18em;color:var(--muted);
    text-transform:uppercase; margin-bottom:12px; display:flex;align-items:center;gap:8px}
  .lbl::after{content:"";flex:1;height:1px;background:var(--line)}

  /* mode pills */
  .pills{display:flex;gap:8px;margin-bottom:14px}
  .pill{flex:1;text-align:center;padding:10px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);font-weight:600;text-transform:uppercase;font-size:13px;letter-spacing:.04em;cursor:pointer}
  .pill.active{background:var(--amber);color:#1a0f04;border-color:var(--amber)}

  /* note steps */
  .steps{display:flex;gap:8px;flex-wrap:wrap}
  .note{
    flex:1; min-width:64px; background:#0c0a09; border:1px solid var(--line);
    border-radius:10px; padding:12px 8px; text-align:center; position:relative; overflow:hidden;
  }
  .note .str{font-family:"JetBrains Mono";font-size:11px;color:var(--muted);letter-spacing:.06em}
  .note .fr{font-family:"Anton";font-size:30px;line-height:1;color:var(--ink);margin:2px 0}
  .note .art{font-family:"Barlow Condensed";font-size:11px;color:var(--amber);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .note.bend{border-color:var(--amber-dim)}
  .note.bend .fr{color:var(--amber)}
  .note.seam{border-color:var(--hot)}
  .note.seam .art{color:var(--hot)}
  .arrowhint{font-family:"JetBrains Mono";font-size:10px;color:var(--muted);margin-top:10px;text-align:center;letter-spacing:.04em}

  /* counter */
  .counter{display:flex;gap:12px;align-items:stretch}
  .clean{flex:1.4;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:16px;text-align:center;font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:16px;color:var(--ink)}
  .clean:active{transform:translateY(1px)}
  .stat{flex:1;background:#0c0a09;border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center}
  .stat .n{font-family:"JetBrains Mono";font-weight:800;font-size:30px;color:var(--amber);line-height:1}
  .stat .k{font-family:"JetBrains Mono";font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:6px}
  .reset{font-size:11px;color:var(--muted);background:none;border:none;text-transform:none;letter-spacing:0;margin-top:6px;width:100%}

  .rule{
    font-family:"Barlow Condensed"; color:var(--muted); font-size:15px; line-height:1.4;
    border-left:3px solid var(--hot); padding:4px 0 4px 12px; margin-top:4px;
  }
  .rule b{color:var(--ink);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>RIFF<br><span>TRAINER</span></h1>
    <div class="tag">compasso&nbsp;85<br>Cm&nbsp;·&nbsp;8va<br>alvo&nbsp;125&nbsp;bpm</div>
  </header>

  <!-- METRONOME -->
  <div class="panel">
    <div class="display">
      <div class="pulse" id="pulse"></div>
      <div class="bpm" id="bpmReadout">125</div>
      <div class="bpm-unit">batidas / min</div>
    </div>

    <div class="row">
      <button class="step" id="minus">–</button>
      <button class="play" id="playBtn">▶ Tocar</button>
      <button class="step" id="plus">+</button>
    </div>

    <input type="range" id="slider" min="50" max="180" value="125">

    <div class="dice">
      <button id="diceBtn">🎲 Sortear bpm</button>
      <span class="spread">± <input type="number" id="spread" value="15" min="2" max="40"> bpm do alvo</span>
    </div>
  </div>

  <!-- THE CELL -->
  <div class="panel">
    <div class="lbl">o que tocar</div>
    <div class="pills">
      <div class="pill active" data-mode="full" id="pFull">Célula completa</div>
      <div class="pill" data-mode="seam" id="pSeam">Só a emenda</div>
    </div>
    <div class="steps" id="steps"></div>
    <div class="arrowhint" id="hint"></div>
  </div>

  <!-- CLEAN REP COUNTER -->
  <div class="panel">
    <div class="lbl">repetições limpas (sessão)</div>
    <div class="counter">
      <button class="clean" id="cleanBtn">✓ Limpa</button>
      <div class="stat"><div class="n" id="cleanCount">0</div><div class="k">limpas</div></div>
      <div class="stat"><div class="n" id="maxBpm">—</div><div class="k">máx limpo</div></div>
    </div>
    <button class="reset" id="resetBtn">zerar sessão</button>
  </div>

  <div class="rule">Travou? <b>3 falhas seguidas → encolhe pra só a emenda (ou só o bend). Nunca recomeça do topo.</b></div>
</div>

<script>
(() => {
  // ---------- state ----------
  let bpm = 125, playing = false, mode = "full";
  let cleanCount = 0, maxClean = 0;

  // ---------- the cell ----------
  const full = [
    {str:"corda E", fr:"9",  art:"paletada"},
    {str:"corda B", fr:"12", art:"paletada"},
    {str:"corda B", fr:"9",  art:"pull-off", },
    {str:"corda G", fr:"11", art:"bend 1 tom", bend:true},
  ];
  const seam = [
    {str:"corda G", fr:"11", art:"bend", bend:true, seam:true},
    {str:"—",       fr:"↓",  art:"solta", seam:true},
    {str:"corda E", fr:"9",  art:"paletada", seam:true},
    {str:"corda B", fr:"12", art:"paletada", seam:true},
  ];
  const hints = {
    full: "três primeiras em tercina · bend em semicolcheia",
    seam: "a virada de volta — o ponto crítico da repetição"
  };

  // ---------- render ----------
  const stepsEl = document.getElementById("steps");
  const hintEl  = document.getElementById("hint");
  function render(){
    const data = mode === "full" ? full : seam;
    stepsEl.innerHTML = data.map(n =>
      `<div class="note ${n.bend?'bend':''} ${n.seam?'seam':''}">
        <div class="str">${n.str}</div>
        <div class="fr">${n.fr}</div>
        <div class="art">${n.art}</div>
      </div>`).join("");
    hintEl.textContent = hints[mode];
  }

  // ---------- bpm controls ----------
  const readout = document.getElementById("bpmReadout");
  const slider  = document.getElementById("slider");
  function setBpm(v){
    bpm = Math.max(50, Math.min(180, Math.round(v)));
    readout.textContent = bpm;
    slider.value = bpm;
  }
  document.getElementById("minus").onclick = () => setBpm(bpm-1);
  document.getElementById("plus").onclick  = () => setBpm(bpm+1);
  slider.oninput = e => setBpm(+e.target.value);
  document.getElementById("diceBtn").onclick = () => {
    const sp = +document.getElementById("spread").value || 15;
    const lo = 125 - sp, hi = 125 + sp;
    setBpm(lo + Math.random()*(hi-lo));
    flash();
  };
  function flash(){ readout.animate(
    [{transform:'scale(1.12)',filter:'brightness(1.6)'},{transform:'scale(1)',filter:'brightness(1)'}],
    {duration:260, easing:'ease-out'}); }

  // ---------- mode ----------
  const pFull = document.getElementById("pFull"), pSeam = document.getElementById("pSeam");
  pFull.onclick = () => { mode="full"; pFull.classList.add("active"); pSeam.classList.remove("active"); render(); };
  pSeam.onclick = () => { mode="seam"; pSeam.classList.add("active"); pFull.classList.remove("active"); render(); };

  // ---------- Web Audio metronome (lookahead scheduler) ----------
  let ac = null, beat = 0, nextTime = 0, timer = null;
  const LOOK = 0.025, AHEAD = 0.1;
  const pulse = document.getElementById("pulse");

  function click(time, accent){
    const o = ac.createOscillator(), g = ac.createGain();
    o.frequency.value = accent ? 1500 : 900;
    g.gain.setValueAtTime(0.0001, time);
    g.gain.exponentialRampToValueAtTime(accent?0.5:0.32, time+0.001);
    g.gain.exponentialRampToValueAtTime(0.0001, time+0.06);
    o.connect(g); g.connect(ac.destination);
    o.start(time); o.stop(time+0.07);
    // visual
    const delay = Math.max(0,(time-ac.currentTime)*1000);
    setTimeout(()=>{ pulse.className = "pulse " + (accent?"acc":"on");
      setTimeout(()=>pulse.className="pulse",70); }, delay);
  }
  function schedule(){
    while(nextTime < ac.currentTime + AHEAD){
      click(nextTime, beat % 4 === 0);
      nextTime += 60/bpm;
      beat++;
    }
  }
  function start(){
    if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)();
    if(ac.state === "suspended") ac.resume();
    beat = 0; nextTime = ac.currentTime + 0.06;
    timer = setInterval(schedule, LOOK*1000);
    playing = true;
    const b = document.getElementById("playBtn");
    b.textContent = "■ Parar"; b.classList.add("stop");
  }
  function stop(){
    clearInterval(timer); playing = false; pulse.className="pulse";
    const b = document.getElementById("playBtn");
    b.textContent = "▶ Tocar"; b.classList.remove("stop");
  }
  document.getElementById("playBtn").onclick = () => playing ? stop() : start();

  // ---------- clean rep counter ----------
  const cc = document.getElementById("cleanCount"), mb = document.getElementById("maxBpm");
  document.getElementById("cleanBtn").onclick = () => {
    cleanCount++; cc.textContent = cleanCount;
    if(bpm > maxClean){ maxClean = bpm; mb.textContent = maxClean; }
  };
  document.getElementById("resetBtn").onclick = () => {
    cleanCount = 0; maxClean = 0; cc.textContent = "0"; mb.textContent = "—";
  };

  // ---------- init ----------
  setBpm(125); render();
})();
</script>
</body>
</html>
